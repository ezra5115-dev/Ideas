<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SYD Lazarus Pit</title>
<meta name="description" content="SYD Lazarus Pit" />
<meta property="og:title" content="SYD Lazarus Pit" />
<meta property="og:description" content="SYD Lazarus Pit" />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://syd-idea.pages.dev/" />
<link rel="canonical" href="https://syd-idea.pages.dev/" />
<link rel="alternate" type="application/json" href="/api/articles.json" />
<link rel="alternate" type="text/plain" href="/llms.txt" title="LLM-readable catalog" />
<link rel="alternate" type="text/plain" href="/llms-full.txt" title="LLM-readable full content" />
<link rel="alternate" type="application/rss+xml" href="/rss.xml" title="RSS" />
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAFAF8;--bg-card:#FFFFFF;--bg-soft:#f4ece3;--text:#1a1a1a;--text-secondary:#6b6b6b;--text-tertiary:#999;
  --accent:#b7794c;--accent-soft:#f0e0d0;--border:#e8e2da;
  --shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03);
  --shadow-hover:0 2px 8px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.06);
  --radius:14px;--max-w:880px;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;
  --serif:'Noto Serif SC','Source Han Serif SC','Songti SC',Georgia,serif;
}
@media (prefers-color-scheme:dark){:root{--bg:#141413;--bg-card:#1e1e1c;--bg-soft:#27211d;--text:#e8e4df;--text-secondary:#9a9590;--text-tertiary:#6b6560;--accent:#d4956a;--accent-soft:#2a2220;--border:#2a2825;--shadow:0 1px 3px rgba(0,0,0,.25),0 4px 12px rgba(0,0,0,.18);--shadow-hover:0 2px 8px rgba(0,0,0,.32),0 8px 24px rgba(0,0,0,.22)}}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:var(--sans);background:radial-gradient(circle at 18% -10%,var(--bg-soft),transparent 30%),var(--bg);color:var(--text);line-height:1.6;min-height:100vh;padding:0 20px}
.wrap{max-width:var(--max-w);margin:0 auto}

/* Nav */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:32px 0 0;flex-wrap:wrap;gap:12px}
.topbar h1{font-family:var(--serif);font-size:38px;letter-spacing:-.035em}
.nav{display:flex;gap:4px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:4px}
.nav a{padding:7px 14px;border-radius:9px;text-decoration:none;color:var(--text-secondary);font-size:13.5px;transition:.15s}
.nav a.active,.nav a:hover{background:var(--accent);color:#fff}
.stats{color:var(--text-tertiary);font-size:13px;margin:6px 0 18px}

/* Toolbar */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:0 0 18px}
.search{flex:1;min-width:220px;padding:10px 14px;border:1px solid var(--border);border-radius:12px;background:var(--bg-card);color:var(--text);font-size:14px;font-family:var(--sans)}
.search:focus{outline:none;border-color:var(--accent)}
.view-toggles{display:inline-flex;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--bg-card)}
.view-btn{padding:8px 12px;border:0;background:transparent;color:var(--text-secondary);cursor:pointer;font-size:13px}
.view-btn.active{background:var(--accent);color:#fff}

/* Filters */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cat{padding:5px 11px;border-radius:8px;font-size:12.5px;cursor:pointer;color:var(--text-secondary);border:1px dashed var(--border);transition:.15s}
.cat.active{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}
.pills-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.pill{padding:5px 11px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);border-radius:999px;font-size:12px;cursor:pointer;transition:.15s}
.pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.pill-more{background:transparent;color:var(--text-tertiary);font-size:12px;cursor:pointer;border:0;padding:5px 6px}

/* Month groups */
.month-group{margin-bottom:26px}
.month-header{display:flex;align-items:baseline;gap:10px;padding:6px 0;border:0;background:transparent;color:var(--text);cursor:pointer;width:100%;text-align:left;font-family:var(--serif)}
.month-header h2{font-size:20px;letter-spacing:-.02em;font-weight:600}
.month-header .mcount{color:var(--text-tertiary);font-size:12.5px;font-family:var(--sans)}
.month-header .chev{margin-left:auto;color:var(--text-tertiary);transition:.2s}
.month-header.collapsed .chev{transform:rotate(-90deg)}
.month-items{display:grid;gap:12px;margin-top:12px}
.month-items.collapsed{display:none}
body.view-card .month-items{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}

/* Cards */
.card{display:block;text-decoration:none;color:inherit;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);transition:.18s}
.card:hover{transform:translateY(-2px);border-color:color-mix(in srgb,var(--accent) 45%,var(--border));box-shadow:var(--shadow-hover)}
.card .meta{display:flex;gap:8px;flex-wrap:wrap;color:var(--text-tertiary);font-size:12px;align-items:center}
.card .dot{width:3px;height:3px;border-radius:50%;background:var(--text-tertiary);display:inline-block}
.card .cat-label{color:var(--accent);font-weight:600;font-size:11px;letter-spacing:.05em;text-transform:uppercase}
.card h3{font-family:var(--serif);font-size:19px;line-height:1.3;letter-spacing:-.015em;margin:7px 0 7px;font-weight:600}
.card .tldr{color:var(--text-secondary);font-size:14px;line-height:1.6;margin:0 0 10px}
.card .topics{display:flex;gap:5px;flex-wrap:wrap}
.card .topic{font-size:11px;color:var(--text-secondary);background:var(--bg-soft);padding:2px 8px;border-radius:999px}

.empty{padding:28px;color:var(--text-tertiary);text-align:center;border:1px dashed var(--border);border-radius:var(--radius)}
.pagination{display:flex;gap:6px;justify-content:center;margin:20px 0 50px}
.pagination button{padding:6px 11px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);border-radius:8px;cursor:pointer;font-size:13px}
.pagination button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.pagination button:disabled{opacity:.35;cursor:not-allowed}
footer{padding:30px 0 50px;color:var(--text-tertiary);font-size:13px;display:flex;gap:14px;flex-wrap:wrap;border-top:1px solid var(--border)}
footer a{color:var(--text-tertiary)}
</style>
</head>
<body class="view-list">
<div class="wrap">
  <div class="topbar">
    <h1>SYD Lazarus Pit</h1>
    <nav class="nav">
      <a href="/" class="active">全部</a>
      <a href="/projects.html">Projects</a>
      <a href="/daily.html">Daily</a>
    </nav>
  </div>
  <div class="stats" id="stats">…</div>

  <section class="toolbar">
    <input id="search" class="search" placeholder="搜索标题、摘要……" />
    <div class="view-toggles">
      <button class="view-btn active" data-view="list">列表</button>
      <button class="view-btn" data-view="card">卡片</button>
    </div>
  </section>
  <div class="filters" id="cats"></div>
  <div class="pills-wrap" id="pills"></div>
  <main id="list"></main>
  <nav class="pagination" id="pager"></nav>
  <footer>
    <span>SYD Lazarus Pit</span>
    <a href="/api/articles.json">JSON</a>
    <a href="/llms.txt">llms.txt</a>
    <a href="/rss.xml">RSS</a>
    <a href="/sitemap.xml">sitemap</a>
  </footer>
</div>
<script>
const PER_PAGE=20;
const state={notes:[],q:'',tag:'all',cat:'all',view:'list',page:1,showAllTags:false};
const $=s=>document.querySelector(s);
const list=$('#list'),search=$('#search'),cats=$('#cats'),pills=$('#pills'),pager=$('#pager');
fetch('/api/articles.json?v=20260624-3',{cache:'no-store'}).then(r=>r.json()).then(d=>{
  state.notes=(d.notes||d.articles||[]).slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  $('#stats').textContent=state.notes.length+' notes · updated '+(d.updated||'');
  buildCats();buildTags();render();
}).catch(()=>list.innerHTML='<div class="empty">读取失败</div>');

function buildCats(){
  const order=['all','notes','studio','worlds','reads','prompts','logs'];
  const present=new Set(state.notes.map(n=>n.category||'notes'));
  cats.innerHTML=order.filter(c=>c==='all'||present.has(c)).map(c=>`<span class="cat ${c===state.cat?'active':''}" data-cat="${c}">${labelCat(c)}</span>`).join('');
  cats.onclick=e=>{const t=e.target.closest('.cat');if(!t)return;state.cat=t.dataset.cat;state.page=1;buildCats();render()};
}
function labelCat(c){return {all:'全部',notes:'碎片',studio:'Studio',worlds:'世界观',reads:'阅读',prompts:'Prompt',logs:'日志'}[c]||c}
function buildTags(){
  const tags=[...new Set(state.notes.flatMap(n=>n.tags||n.topics||[]))].sort();
  const top=tags.slice(0,8),rest=tags.slice(8);
  let html=['all',...top].map(t=>`<span class="pill ${t===state.tag?'active':''}" data-tag="${t}">${t==='all'?'标签':t}</span>`).join('');
  if(rest.length){
    html+=`<button class="pill-more" id="more-tags">${state.showAllTags?'收起':'更多'} (${rest.length})</button>`;
    if(state.showAllTags) html+=rest.map(t=>`<span class="pill ${t===state.tag?'active':''}" data-tag="${t}">${t}</span>`).join('');
  }
  pills.innerHTML=html;
  pills.onclick=e=>{
    const pill=e.target.closest('.pill');if(pill){state.tag=pill.dataset.tag;state.page=1;buildTags();render();return}
    if(e.target.id==='more-tags'){state.showAllTags=!state.showAllTags;buildTags();return}
  };
}
search.addEventListener('input',()=>{state.q=search.value.trim().toLowerCase();state.page=1;render()});
document.querySelectorAll('.view-btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.view-btn').forEach(x=>x.classList.toggle('active',x===b));
  state.view=b.dataset.view;document.body.classList.toggle('view-card',state.view==='card');document.body.classList.toggle('view-list',state.view==='list');render();
}));
function filtered(){
  return state.notes.filter(n=>{
    if(state.cat!=='all'&&(n.category||'notes')!==state.cat)return false;
    const t=(n.tags||n.topics||[]);
    if(state.tag!=='all'&&!t.includes(state.tag))return false;
    if(state.q&&!JSON.stringify(n).toLowerCase().includes(state.q))return false;
    return true;
  });
}
function groupByMonth(items){
  const map=new Map();
  items.forEach(n=>{const m=(n.date||'').slice(0,7)||'未标日期';if(!map.has(m))map.set(m,[]);map.get(m).push(n)});
  return [...map.entries()];
}
function render(){
  const items=filtered();const total=items.length;const pages=Math.max(1,Math.ceil(total/PER_PAGE));
  if(state.page>pages)state.page=pages;
  const start=(state.page-1)*PER_PAGE;const slice=items.slice(start,start+PER_PAGE);
  if(!slice.length){list.innerHTML='<div class="empty">没有匹配内容。</div>';pager.innerHTML='';return}
  const groups=groupByMonth(slice);
  list.innerHTML=groups.map(([m,arr])=>`
    <section class="month-group">
      <button class="month-header" data-month="${m}"><h2>${m}</h2><span class="mcount">${arr.length}</span><span class="chev">▾</span></button>
      <div class="month-items" data-month-items="${m}">${arr.map(card).join('')}</div>
    </section>`).join('');
  list.querySelectorAll('.month-header').forEach(h=>h.addEventListener('click',()=>{
    const m=h.dataset.month;h.classList.toggle('collapsed');
    list.querySelector(`[data-month-items="${m}"]`).classList.toggle('collapsed');
  }));
  renderPager(pages);
}
function card(n){
  const t=(n.tags||n.topics||[]).slice(0,4);
  return `<a class="card" href="${n.url}">
    <div class="meta"><span>${n.date||''}</span><span class="dot"></span><span class="cat-label">${labelCat(n.category||'notes')}</span>${n.readMin?`<span class="dot"></span><span>${n.readMin} min</span>`:''}</div>
    <h3>${esc(n.title||'')}</h3>
    <p class="tldr">${esc(n.summary||n.tldr||'')}</p>
    <div class="topics">${t.map(x=>`<span class="topic">${esc(x)}</span>`).join('')}</div>
  </a>`;
}
function renderPager(pages){
  if(pages<=1){pager.innerHTML='';return}
  const p=state.page;
  pager.innerHTML=`<button ${p===1?'disabled':''} data-p="${p-1}">‹</button>`+[...Array(pages).keys()].map(i=>{
    const n=i+1;return `<button class="${n===p?'active':''}" data-p="${n}">${n}</button>`;
  }).join('')+`<button ${p===pages?'disabled':''} data-p="${p+1}">›</button>`;
  pager.onclick=e=>{const b=e.target.closest('button[data-p]');if(!b)return;state.page=Number(b.dataset.p);render();window.scrollTo({top:0,behavior:'smooth'})};
}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
</script>
</body>
</html>
