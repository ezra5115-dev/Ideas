<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Projects — SYD Lazarus Pit</title>
<meta name="description" content="SYD Lazarus Pit project checklist" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#FAFAF8;--card:#fff;--soft:#f4ece3;--text:#1a1a1a;--muted:#746d66;--light:#aaa39b;--accent:#b7794c;--border:#e8e2da;--shadow:0 4px 20px rgba(0,0,0,.04);--sans:Inter,-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;--serif:'Noto Serif SC','Source Han Serif SC',Georgia,serif}
@media(prefers-color-scheme:dark){:root{--bg:#141313;--card:#1e1c1a;--soft:#27211d;--text:#eee8df;--muted:#9d958c;--light:#6b6560;--accent:#d59a6f;--border:#2c2a26;--shadow:none}}
body{background:radial-gradient(circle at 18% -10%,var(--soft),transparent 30%),var(--bg);color:var(--text);font-family:var(--sans);line-height:1.65;padding:0 20px}.wrap{max-width:920px;margin:0 auto;padding:42px 0 80px}.back{color:var(--accent);text-decoration:none;font-size:14px}.hero{padding:30px 0}.eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:700}h1{font-family:var(--serif);font-size:42px;letter-spacing:-.03em;line-height:1.15;margin:8px 0 12px}.desc{color:var(--muted);max-width:660px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0 24px}.search{flex:1;min-width:240px;border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:12px;padding:11px 14px}.pill{border:1px solid var(--border);background:var(--card);color:var(--muted);border-radius:999px;padding:8px 12px;cursor:pointer}.pill.active{background:var(--accent);border-color:var(--accent);color:#fff}.grid{display:grid;gap:18px}.project{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px;box-shadow:var(--shadow)}.top{display:flex;gap:14px;justify-content:space-between;align-items:flex-start}.project h2{font-family:var(--serif);font-size:25px;letter-spacing:-.02em}.status{font-size:12px;color:#fff;background:var(--accent);border-radius:999px;padding:3px 9px}.summary{color:var(--muted);margin:8px 0 14px}.tags{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}.tag{font-size:12px;color:var(--accent);background:var(--soft);border-radius:999px;padding:3px 9px}.bar{height:8px;border-radius:999px;background:var(--soft);overflow:hidden;margin:6px 0 14px}.bar span{display:block;height:100%;background:var(--accent);width:0}.stats{font-size:13px;color:var(--light);margin-bottom:10px}.checklist{display:grid;gap:9px;margin-top:12px}.item{display:flex;gap:10px;align-items:flex-start;color:var(--muted)}.box{width:18px;height:18px;border-radius:5px;border:1px solid var(--border);flex:0 0 auto;margin-top:4px;display:grid;place-items:center}.done .box{background:var(--accent);border-color:var(--accent);color:white}.done .txt{text-decoration:line-through;color:var(--light)}.empty{padding:28px;border:1px dashed var(--border);border-radius:16px;color:var(--light);text-align:center}footer{margin-top:36px;border-top:1px solid var(--border);padding-top:18px;color:var(--light);font-size:13px}footer a{color:var(--light)}
</style>
</head>
<body>
<main class="wrap">
  <a class="back" href="/">← 返回首页</a>
  <section class="hero">
    <div class="eyebrow">Project Checklist</div>
    <h1>Projects</h1>
    <p class="desc">这里放当前需要推进的项目。每个 Project 是一个可打开、可检查、可持续更新的 checklist。</p>
  </section>
  <section class="toolbar">
    <input id="search" class="search" placeholder="搜索 project、tag、任务……" />
    <button class="pill active" data-filter="all">全部</button>
    <button class="pill" data-filter="active">进行中</button>
    <button class="pill" data-filter="done">已完成</button>
  </section>
  <section id="list" class="grid"></section>
  <footer><a href="/">SYD Lazarus Pit</a> · <a href="/content/projects.json">projects.json</a></footer>
</main>
<script>
let projects=[],filter='all',q='';
const list=document.querySelector('#list'),search=document.querySelector('#search');
fetch('/content/projects.json?v=20260621-1',{cache:'no-store'}).then(r=>r.json()).then(d=>{projects=d.projects||[];render()}).catch(()=>list.innerHTML='<div class="empty">读取 projects.json 失败</div>');
search.oninput=()=>{q=search.value.trim().toLowerCase();render()};
document.querySelectorAll('.pill').forEach(b=>b.onclick=()=>{document.querySelectorAll('.pill').forEach(x=>x.classList.toggle('active',x===b));filter=b.dataset.filter;render()});
function render(){
 const items=projects.filter(p=>{const total=p.checklist.length,done=p.checklist.filter(x=>x.done).length; if(filter==='active'&&done===total)return false; if(filter==='done'&&done!==total)return false; return !q||JSON.stringify(p).toLowerCase().includes(q)});
 list.innerHTML=items.length?items.map(card).join(''):'<div class="empty">没有匹配的 Project。</div>';
}
function card(p){const total=p.checklist.length,done=p.checklist.filter(x=>x.done).length,percent=total?Math.round(done/total*100):0;return `<article class="project"><div class="top"><div><h2>${esc(p.title)}</h2><p class="summary">${esc(p.summary)}</p></div><span class="status">${p.status}</span></div><div class="tags">${(p.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div><div class="stats">${done}/${total} done · ${percent}%</div><div class="bar"><span style="width:${percent}%"></span></div><div class="checklist">${p.checklist.map(i=>`<div class="item ${i.done?'done':''}"><span class="box">${i.done?'✓':''}</span><span class="txt">${esc(i.text)}</span></div>`).join('')}</div></article>`}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
</script>
</body>
</html>
