<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>装修 — SYD Lazarus Pit</title>
<meta name="description" content="装修记录" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#FAFAF8;--card:#fff;--soft:#f4ece3;--text:#1a1a1a;--muted:#746d66;--light:#aaa39b;--accent:#b7794c;--border:#e8e2da;--shadow:0 4px 20px rgba(0,0,0,.04);--sans:Inter,-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;--serif:'Noto Serif SC','Source Han Serif SC',Georgia,serif}
@media(prefers-color-scheme:dark){:root{--bg:#141313;--card:#1e1c1a;--soft:#27211d;--text:#eee8df;--muted:#9d958c;--light:#6b6560;--accent:#d59a6f;--border:#2c2a26;--shadow:none}}
body{background:radial-gradient(circle at 18% -10%,var(--soft),transparent 30%),var(--bg);color:var(--text);font-family:var(--sans);line-height:1.65;padding:0 20px}.wrap{max-width:920px;margin:0 auto;padding:42px 0 80px}.back{color:var(--accent);text-decoration:none;font-size:14px}.hero{padding:30px 0}.eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:700}h1{font-family:var(--serif);font-size:42px;letter-spacing:-.03em;line-height:1.15;margin:8px 0 12px}.desc{color:var(--muted);max-width:660px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0 24px}.search{flex:1;min-width:240px;border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:12px;padding:11px 14px}.day-group{margin-bottom:28px}.day-header{display:flex;align-items:baseline;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);margin-bottom:10px}.day-header h2{font-family:var(--serif);font-size:18px;letter-spacing:-.015em}.day-header .dow{color:var(--light);font-size:13px}.entry{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:10px;box-shadow:var(--shadow)}.entry p{color:var(--text);font-size:15px;line-height:1.75;font-family:var(--serif);margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:14px;margin-top:8px}
.diagram{white-space:pre;overflow:auto;background:var(--soft);border:1px solid var(--border);border-radius:12px;padding:14px;margin:12px 0;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:13px;line-height:1.6;color:var(--text)}
th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);font-weight:600;color:var(--accent);font-size:12px;letter-spacing:.05em;text-transform:uppercase}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top}
tr:last-child td{border-bottom:0}
.status{font-size:12px;border-radius:999px;padding:2px 8px;display:inline-block}
.status-done{background:#d4edda;color:#2e7d32}
.status-pending{background:var(--soft);color:var(--accent)}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.tag{font-size:11px;color:var(--accent);background:var(--soft);border-radius:999px;padding:2px 8px}
.empty{padding:28px;border:1px dashed var(--border);border-radius:16px;color:var(--light);text-align:center}
.stat-row{display:flex;gap:20px;margin:16px 0 24px;flex-wrap:wrap}
.stat{border:1px solid var(--border);border-radius:12px;padding:14px 18px;background:var(--card)}.stat .n{font-size:28px;font-weight:700;font-family:var(--serif)}.stat .l{font-size:12px;color:var(--light);margin-top:2px}
footer{margin-top:36px;border-top:1px solid var(--border);padding-top:18px;color:var(--light);font-size:13px}footer a{color:var(--light)}
</style>
</head>
<body>
<main class="wrap">
  <a class="back" href="/">← 返回首页</a>
  <section class="hero">
    <div class="eyebrow">Reno Log</div>
    <h1>装修</h1>
    <p class="desc">装修进度与待购清单。在 Cohub 里说「记录装修」即可更新。</p>
  </section>
  <section class="toolbar">
    <input id="search" class="search" placeholder="搜索项目……" />
  </section>
  <section class="stat-row" id="stats"></section>
  <section id="list"></section>
  <footer><a href="/">SYD Lazarus Pit</a> · <a href="/content/reno.json">reno.json</a></footer>
</main>
<script>
let entries=[],q='';const list=document.querySelector('#list'),search=document.querySelector('#search'),stats=document.querySelector('#stats');
fetch('/content/reno.json?v=20260625',{cache:'no-store'}).then(r=>r.json()).then(d=>{
  entries=(d.entries||[]).slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  showStats();render();
}).catch(()=>list.innerHTML='<div class="empty">读取失败</div>');
search.oninput=()=>{q=search.value.trim().toLowerCase();render()};
const WDAYS=['日','一','二','三','四','五','六'];
function showStats(){
  let total=0,done=0;
  entries.forEach(e=>{(e.table||[]).forEach(t=>{const status=t.status||t.状态||'';total++;if(status.includes('待施工')||status.includes('已预约')||status.includes('已完成'))done++})});
  stats.innerHTML=`<div class="stat"><div class="n">${total||0}</div><div class="l">总项目</div></div><div class="stat"><div class="n">${done||0}</div><div class="l">已推进</div></div><div class="stat"><div class="n">${total-done||0}</div><div class="l">待处理</div></div>`;
}
function render(){
  const items=q?entries.map(e=>({...e,table:(e.table||[]).filter(t=>JSON.stringify(t).toLowerCase().includes(q))})).filter(e=>e.table.length):entries;
  if(!items.length){list.innerHTML='<div class="empty">没有匹配项目。</div>';return}
  list.innerHTML=items.map(e=>{
    const dt=new Date(e.date+'T00:00:00+08:00'),dow=WDAYS[dt.getDay()];
    let html=`<section class="day-group"><div class="day-header"><h2>${e.date}</h2><span class="dow">周${dow}</span></div>`;
    if(e.content) html+=`<div class="entry"><p>${esc(e.content)}</p>`;
    if(e.diagram) html+=`<pre class="diagram">${esc(e.diagram)}</pre>`;
    if(e.table&&e.table.length){
      html+=`<table><thead><tr><th>类别</th><th>项目</th><th>规格/数量</th><th>状态</th></tr></thead><tbody>`;
      e.table.forEach(r=>{
        const s=r.status||r.状态||'';
        const cls=s.includes('已完成')||s.includes('已预约')||s.includes('待施工')?'status-done':'status-pending';
        html+=`<tr><td>${esc(r.类别||'')}</td><td>${esc(r.项目||'')}</td><td>${esc(r.规格||'')}</td><td><span class="status ${cls}">${esc(s)}</span></td></tr>`;
      });
      html+=`</tbody></table>`;
    }
    html+=`${(e.tags||[]).length?`<div class="tags">${e.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:''}</div></section>`;
    return html;
  }).join('');
}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
</script>
</body>
</html>
